esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  project:
    name: "automatic-house-systems.esp32-ha-kit"
    version: "1.0.0"

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  power_save_mode: none

  ap:
    ssid: "${friendly_name}"
    password: !secret fallback_password

web_server:
  port: 80
  version: 3
  local: true
  auth:
    username: !secret web_username
    password: !secret web_password

i2c:
  sda: ${sda_pin}
  scl: ${scl_pin}
  frequency: 400kHz
  scan: true

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10

sensor:
  - platform: dht
    pin: ${dht_pin}
    model: DHT11
    update_interval: 5s
    temperature:
      id: temperature
      name: "Temperatura"
      accuracy_decimals: 1
    humidity:
      id: humidity
      name: "Umiditate"
      accuracy_decimals: 1

binary_sensor:
  - platform: gpio
    id: motion
    pin: ${pir_pin}
    name: "Miscare"
    device_class: motion

switch:
  - platform: gpio
    id: relay
    name: "Releu"
    pin:
      number: ${relay_pin}
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: heartbeat
    internal: true
    pin: ${heartbeat_pin}
    restore_mode: ALWAYS_OFF

interval:
  - interval: 1s
    then:
      - switch.toggle: heartbeat

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: ${oled_address}
    update_interval: 1s
    lambda: |-
      it.printf(0, 0, id(font_small), "ESP32 HA Kit");

      if (isnan(id(temperature).state)) {
        it.printf(0, 14, id(font_small), "Temp: --.- C");
      } else {
        it.printf(0, 14, id(font_small), "Temp: %.1f C", id(temperature).state);
      }

      if (isnan(id(humidity).state)) {
        it.printf(0, 27, id(font_small), "Umid: --.- %%");
      } else {
        it.printf(0, 27, id(font_small), "Umid: %.1f %%", id(humidity).state);
      }

      it.printf(0, 40, id(font_small), "PIR: %s",
                id(motion).state ? "MISCARE" : "liber");
      it.printf(0, 53, id(font_small), "Releu: %s",
                id(relay).state ? "ON" : "OFF");
