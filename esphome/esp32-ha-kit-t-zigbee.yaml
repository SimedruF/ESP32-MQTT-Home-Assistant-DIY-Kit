substitutions:
  device_name: "esp32-ha-kit-t-zigbee"
  friendly_name: "ESP32 HA Kit T-Zigbee"
  dht_pin: "GPIO4"
  pir_pin: "GPIO5"
  relay_pin: "GPIO6"
  heartbeat_pin: "GPIO7"
  sda_pin: "GPIO8"
  scl_pin: "GPIO1"
  oled_address: "0x3C"

packages:
  common: !include common.yaml

esp32:
  board: ttgo-t-oi-plus
  framework:
    type: esp-idf

logger:
  hardware_uart: UART0

esphome:
  on_boot:
    priority: 800
    then:
      - output.turn_on: zigbee_coprocessor_power

output:
  - platform: gpio
    id: zigbee_coprocessor_power
    pin: GPIO0
